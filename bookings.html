<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNOVA | Gallery</title>
  <link rel="stylesheet" href="style.css">

</head>

<body>
   
    <nav>
       <button class="hamburger" id="hamburger" aria-label="Menu">
         <span></span>
         <span></span>
       </button>
       <a class="nav-logo" href="index.html">SNOVA</a>
       <ul class="nav-links">
         <li><a href="index.html">Home</a></li>
         <li><a href="facilities.html">Facilities</a></li>
         <li><a href="gallery.html">Gallery</a></li>
         <li><a href="bookings.html" class="active">Bookings</a></li>
         <li><a href="feedback.html">Feedback</a></li>
         <li><a href="contact.html">Contact</a></li>
       </ul>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <button class="mobile-close" id="mobileClose">X</button>
        <a href="index.html">Home</a>
        <a href="facilities.html">Facilities</a>
        <a href="gallery.html">Gallery</a>
        <a href="bookings.html">Bookings</a>
        <a href="feedback.html">Feedback</a>
        <a href="contact.html">Contact</a>
    </div>

    <header class="page-header">
        <span class="page-title">Bookings</span>
    </header>

    <div class="booking-hero">
        <img src="bookings.png" alt="Book Now">
    </div>
 
    <main class="booking-body">

        <div class="booking-form-wrap">
            <form id="bookingForm" onsubmit="handleSubmit(event)">

                <div class="form-group">
                    <label>Full Name <span class="req"></span></label>
                    <input type="text" name="full_name" required >
                </div>
                <div class="form-group">
                    <label>Email Address <span class="req"></span></label>
                    <input type="email" name="email" required >
                </div>
                <div class="form-group">
                    <label>Phone Number <span class="req"></span></label>
                    <input type="tel" name="phone" required >
                </div>
                <div class="form-group">
                    <label>Session Date <span class="req"></span></label>
                    <input type="date" name="date" required >
                </div>
                <button type="submit" class="btn-book">BOOK</button>
                <div class="success-msg" id="successMsg">
                    Booking received, we look forward to seeing you!                 
                </div>
            </form>
        </div>
    
    <div class="booking-tagline">
        <h2>We look forward<br>to seeing<br>you.</h2>
    </div>
    
    </main>

    <p class="booking-note">NB: Payment is done when you arrive at the facility.</p>

<footer>
        <p>2026© Kitso Khango</p>
    </footer>

<script>
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobileMenu');
        const mobileClose = document.getElementById('mobileClose');
    
        hamburger.addEventListener('click', () => mobileMenu.classList.toggle('open'));
        mobileClose.addEventListener('click', () => mobileMenu.classList.remove('open'));

        function handleSubmit(e) {
            e.preventDefault();
            const form = document.getElementById('bookingForm');
            const msg = document.getElementById('successMsg');
            msg.style.display = 'block';
            form.reset();
            setTimeout(() => {msg.style.display = 'none';}, 4000);
            
        }
    
    </script>

</body>
</html>
